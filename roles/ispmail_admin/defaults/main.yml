---
# Pannello web per gestire domini/mailbox/alias/redirect di ispmail.sh
# (https://ima.jungclaussen.com), disattivato di default: attivalo solo
# se accetti i compromessi descritti nel README (download solo HTTP,
# nessun checksum pubblicato dal progetto).
ispmail_admin_enabled: false

ispmail_admin_version: "0.9.11"
ispmail_admin_download_url: "http://ima.jungclaussen.com/dwn/dwn.php?v={{ ispmail_admin_version }}&f=.tar.gz"
ispmail_admin_archive_path: "/tmp/ispmail-admin-{{ ispmail_admin_version }}.tar.gz"
ispmail_admin_install_dir: "/var/www/ispmail-admin"

# Vhost dedicato (non un path su ispmail_fqdn): il DNS di questo hostname
# deve puntare a questo host, e il certificato TLS deve coprirlo (SAN o
# wildcard). Obbligatorio se ispmail_admin_enabled=true.
ispmail_admin_fqdn: ""

# Reti autorizzate a raggiungere il pannello. Le porte 80/443 restano
# aperte pubblicamente (servono a Roundcube/rspamd-ui su ispmail_fqdn): la
# restrizione è applicata qui a livello Apache (Require ip) sul vhost
# dedicato di ispmail_admin_fqdn.
ispmail_admin_allow_networks:
  - "10.27.22.0/24"
  - "10.27.0.0/24"

ispmail_admin_db_host: "127.0.0.1"
ispmail_admin_db_port: "3306"
ispmail_admin_db_user: "imaadmin"

# Generate-once: salvate sul controller Ansible (stessa cartella secrets/
# già usata per le password di ispmail.sh), non in group_vars in chiaro.
ispmail_admin_db_password: "{{ lookup('ansible.builtin.password', playbook_dir + '/secrets/' + ispmail_fqdn + '-ima-db.txt', length=32, chars=['ascii_letters', 'digits']) }}"
ispmail_admin_login_user: "admin"
ispmail_admin_login_password: "{{ lookup('ansible.builtin.password', playbook_dir + '/secrets/' + ispmail_fqdn + '-ima-admin.txt', length=20, chars=['ascii_letters', 'digits']) }}"

ispmail_admin_use_quotas: true       # coerente con la colonna "quota" che ispmail.sh crea in virtual_users
# Quota (in BYTE) precompilata nel form dei nuovi account. Il pannello mostra
# "unlimited" per quota=0 ma NON è vero: vale il default globale di Dovecot
# (ispmail_quota_default del ruolo ispmail) - meglio un valore esplicito.
ispmail_admin_default_quota: 2147483648   # 2 GiB
ispmail_admin_support_blacklist: false  # richiede la tabella blacklist_email, non creata da ispmail.sh
