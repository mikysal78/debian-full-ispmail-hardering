---
- name: Assicura che fail2ban sia installato
  ansible.builtin.apt:
    name: fail2ban
    state: present

- name: Distribuisci jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: restart fail2ban

- name: Abilita e avvia fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
