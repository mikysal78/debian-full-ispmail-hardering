---
# FQDN pubblico del mail server (es. "mail.example.com"). Obbligatorio:
# ci deve puntare il DNS pubblico ed è per questo dominio che ispmail.sh
# richiede il certificato Let's Encrypt e configura Postfix/Dovecot/Roundcube.
ispmail_fqdn: ""

ispmail_script_url: "https://workaround.org/ispmail.sh"
ispmail_script_path: "/usr/local/sbin/ispmail.sh"
ispmail_marker_file: "/root/.ispmail_installed"
ispmail_log_file: "/root/ispmail-install-{{ ispmail_fqdn }}.log"

# --- Certificato TLS ---------------------------------------------------
# ispmail.sh usa ovunque nel codice il path standard di certbot
# (/etc/letsencrypt/live/<fqdn>/{fullchain,privkey}.pem) e chiama
# "certbot --apache" SOLO se quella directory non esiste già. Il
# certificato qui è provisionato dal ruolo ansible-dns (validazione DNS-01)
# che lo copia in /etc/ssl/acme/: il ruolo lo copia nel path standard
# PRIMA di eseguire ispmail.sh, che così rileva il certificato esistente
# e salta la propria chiamata a certbot.
ispmail_cert_dir: "/etc/letsencrypt/live/{{ ispmail_fqdn }}"

# ATTENZIONE: i nomi file esatti sotto /etc/ssl/acme/ sono una supposizione
# (stessa convenzione di certbot: fullchain.pem/privkey.pem in una
# sottodirectory per dominio). Verifica sul server con il ruolo ansible-dns
# quali file/percorsi produce davvero e correggi qui se necessario.
ispmail_cert_fullchain_src: "/etc/ssl/acme/{{ ispmail_fqdn }}/fullchain.pem"
ispmail_cert_privkey_src: "/etc/ssl/acme/{{ ispmail_fqdn }}/privkey.pem"
