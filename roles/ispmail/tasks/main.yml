---
- name: Verifica che sia stato indicato ispmail_fqdn
  ansible.builtin.assert:
    that:
      - ispmail_fqdn is defined
      - ispmail_fqdn | length > 0
    fail_msg: >
      Devi impostare ispmail_fqdn (es. "mail.example.com"): è l'FQDN pubblico per
      cui ispmail.sh richiede il certificato Let's Encrypt e configura
      Postfix/Dovecot/Roundcube. Passalo con -e ispmail_fqdn=... oppure
      valorizzalo in group_vars/mailservers.yml o host_vars/<host>.yml.
    quiet: true

- name: Verifica che il ruolo webserver (nginx) di questo repo non sia attivo
  ansible.builtin.assert:
    that:
      - not (role_webserver | default(false))
    fail_msg: >
      role_webserver=true installerebbe nginx sulle porte 80/443, in conflitto
      con Apache installato da ispmail.sh su questo stesso host. Disattivalo
      per gli host in [mailservers] prima di procedere.
    quiet: true

- name: Crea la directory del certificato se non esiste ancora (path standard certbot)
  ansible.builtin.file:
    path: "{{ ispmail_cert_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ispmail_cert_fullchain_src != (ispmail_cert_dir + '/fullchain.pem')

- name: Copia il certificato dal path del ruolo ansible-dns, se diverso da quello standard
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  loop:
    - { src: "{{ ispmail_cert_fullchain_src }}", dest: "{{ ispmail_cert_dir }}/fullchain.pem" }
    - { src: "{{ ispmail_cert_privkey_src }}", dest: "{{ ispmail_cert_dir }}/privkey.pem" }
  when: item.src != item.dest

- name: Verifica che il certificato TLS sia già presente (provisionato es. dal ruolo ansible-dns)
  ansible.builtin.stat:
    path: "{{ ispmail_cert_dir }}/{{ item }}"
  register: ispmail_cert_stat
  loop:
    - fullchain.pem
    - privkey.pem

- name: Blocca se manca il certificato TLS
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: >
      Manca {{ item.item }} in {{ ispmail_cert_dir }}: esegui prima il ruolo
      ansible-dns (o comunque quello che provisiona il certificato Let's
      Encrypt) per questo FQDN. ispmail.sh usa quel path per Postfix,
      Dovecot e Apache e chiamerebbe "certbot --apache" da solo se non lo
      trovasse, cosa che qui non vogliamo (il certificato è gestito altrove).
    quiet: true
  loop: "{{ ispmail_cert_stat.results }}"
  loop_control:
    label: "{{ item.item }}"

# ispmail.sh configura Postfix in modo incrementale (postconf) ma non ne
# genera main.cf da zero: si aspetta un pacchetto postfix già preconfigurato
# in modalità "Internet Site", esattamente come fa roles/mailserver/tasks/main.yml
- name: Preconfigura debconf per un'installazione non interattiva di postfix
  ansible.builtin.debconf:
    name: postfix
    question: "{{ item.q }}"
    value: "{{ item.v }}"
    vtype: "{{ item.t }}"
  loop:
    - { q: "postfix/main_mailer_type", v: "Internet Site", t: "select" }
    - { q: "postfix/mailname", v: "{{ ispmail_fqdn }}", t: "string" }

- name: Installa il pacchetto postfix di base (preconfigurato via debconf sopra)
  ansible.builtin.apt:
    name: postfix
    state: present
    update_cache: true

- name: Scarica lo script di installazione ispmail.sh
  ansible.builtin.get_url:
    url: "{{ ispmail_script_url }}"
    dest: "{{ ispmail_script_path }}"
    mode: "0700"
    owner: root
    group: root
    force: true

# ispmail.sh non chiama mai da solo "a2ensite"/"a2enmod ssl": si aspetta che
# sia stato "certbot --apache" (chiamato prima di apache_config() nello
# script) ad abilitare mod_ssl e il vhost 000-default-le-ssl.conf. Visto che
# qui il certificato è già presente e quella chiamata a certbot viene quindi
# saltata dallo script stesso, senza questa patch apache_config() fallirebbe
# al controllo finale "curl https://$FQDN" (Roundcube non raggiungibile) e
# l'intera installazione si fermerebbe lì, prima di TLS relay/rspamd/DKIM.
- name: Patch ispmail.sh per abilitare comunque mod_ssl e il vhost Apache
  ansible.builtin.blockinfile:
    path: "{{ ispmail_script_path }}"
    marker: "# {mark} ANSIBLE - abilita mod_ssl e vhost anche senza certbot"
    insertbefore: '^\s*a2enmod proxy_http -q\s*$'
    block: |
      a2enmod ssl -q
      a2ensite 000-default-le-ssl -q

- name: Esegui ispmail.sh (una sola volta - installa un intero mail server, richiede diversi minuti)
  ansible.builtin.shell: |
    set -o pipefail
    umask 077
    echo | {{ ispmail_script_path }} -f {{ ispmail_fqdn }} 2>&1 | tee {{ ispmail_log_file }}
    touch {{ ispmail_marker_file }}
  args:
    executable: /bin/bash
    creates: "{{ ispmail_marker_file }}"
  register: ispmail_run

- name: Mostra dove sono le password generate (NON stampate qui per non finire nei log Ansible)
  ansible.builtin.debug:
    msg: >
      Installazione completata. Le password generate (DB mailadmin/mailserver,
      interfaccia web di rspamd) sono nel file {{ ispmail_log_file }} su questo
      host, leggibile solo da root (chmod 600). Copiale subito in un password
      manager e poi elimina il file, es.: "shred -u {{ ispmail_log_file }}".
  when: ispmail_run is changed
